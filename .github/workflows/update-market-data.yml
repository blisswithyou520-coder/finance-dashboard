name: Update Market Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate market data
        run: |
          cat > market-data.json << 'EOF'
          {
            "updated":"AUTO",
            "message":"GitHub Actions 已啟用"
          }
          EOF

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add market-data.json

          git diff --staged --quiet || (
            git commit -m "Auto update market data"
            git push
          )
