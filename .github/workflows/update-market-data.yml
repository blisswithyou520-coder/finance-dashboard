name: Update Market Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate market data
        run: |
          python - <<'PY'
          import json, time, urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from xml.etree import ElementTree as ET

          MAP = {
              "taiwan": {
                  "2330":"2330.TW","2454":"2454.TW","2317":"2317.TW",
                  "0050":"0050.TW","00878":"00878.TW","00919":"00919.TW"
              },
              "us": {
                  "NVDA":"NVDA","AAPL":"AAPL","TSLA":"TSLA",
                  "QQQ":"QQQ","SPY":"SPY","SCHD":"SCHD","VOO":"VOO"
              },
              "crypto": {"BTC":"BTC-USD","ETH":"ETH-USD"},
              "fx": {
                  "USDTWD":"USDTWD=X","JPYTWD":"JPYTWD=X",
                  "EURTWD":"EURTWD=X","CNYTWD":"CNYTWD=X"
              }
          }

          def quote(symbol):
              url=f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?range=5d&interval=1d"
              req=urllib.request.Request(url,headers={"User-Agent":"Mozilla/5.0"})
              with urllib.request.urlopen(req,timeout=20) as r:
                  data=json.loads(r.read().decode("utf-8"))
              result=data["chart"]["result"][0]
              meta=result.get("meta",{})
              price=meta.get("regularMarketPrice") or meta.get("previousClose")
              previous=meta.get("previousClose")
              if previous is None:
                  closes=result.get("indicators",{}).get("quote",[{}])[0].get("close",[])
                  closes=[x for x in closes if x is not None]
                  previous=closes[-2] if len(closes)>=2 else price
              if price is None or previous is None:
                  return {"price":None,"change":None,"changePercent":None}
              change=price-previous
              pct=(change/previous*100) if previous else 0
              return {"price":round(price,4),"change":round(change,4),"changePercent":round(pct,4)}

          def news():
              url="https://news.google.com/rss/search?q=%E8%B2%A1%E7%B6%93+OR+%E5%8F%B0%E8%82%A1+OR+%E7%BE%8E%E8%82%A1+OR+%E9%BB%83%E9%87%91+OR+%E6%AF%94%E7%89%B9%E5%B9%A3&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
              out=[]
              try:
                  req=urllib.request.Request(url,headers={"User-Agent":"Mozilla/5.0"})
                  with urllib.request.urlopen(req,timeout=20) as r:
                      root=ET.fromstring(r.read())
                  for item in root.findall(".//item")[:8]:
                      title=item.findtext("title") or ""
                      link=item.findtext("link") or ""
                      if title and link:
                          out.append({"title":title,"link":link})
              except Exception:
                  pass
              return out

          out={
              "updated":"AUTO",
              "updated_tw":datetime.now(ZoneInfo("Asia/Taipei")).strftime("%m/%d %H:%M"),
              "taiwan":{},"us":{},"crypto":{},"fx":{},"gold":{},
              "fed":{"rate":"請依最新官方公告","direction":"觀望"},
              "news":[]
          }

          for group, symbols in MAP.items():
              for key, symbol in symbols.items():
                  try:
                      out[group][key]=quote(symbol)
                  except Exception as e:
                      out[group][key]={"price":None,"change":None,"changePercent":None,"error":str(e)[:100]}
                  time.sleep(0.15)

          try:
              gold=quote("GC=F")
              usd_twd=out["fx"].get("USDTWD",{}).get("price") or 31.5
              gram=gold["price"]*usd_twd/31.1034768 if gold.get("price") else None
              tael=gram*37.5 if gram else None
              total=gold["price"]*usd_twd if gold.get("price") else None
              out["gold"]={
                  "usd":gold.get("price"),
                  "twd":round(gram,0) if gram else None,
                  "tael":round(tael,0) if tael else None,
                  "twdTotal":round(total,0) if total else None,
                  "changePercent":gold.get("changePercent")
              }
          except Exception as e:
              out["gold"]={"usd":None,"twd":None,"tael":None,"twdTotal":None,"changePercent":None,"error":str(e)[:100]}

          out["news"]=news()

          with open("market-data.json","w",encoding="utf-8") as f:
              json.dump(out,f,ensure_ascii=False,indent=2)
          PY

      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add market-data.json
          git commit -m "Update market data" || exit 0
          git push
