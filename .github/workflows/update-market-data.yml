name: Update Market Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate realtime market data
        run: |
          python - <<'PY'
          import json, time, urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from xml.etree import ElementTree as ET

          STOCKS = {
              "taiwan": {"2330":"2330.TW","2454":"2454.TW","2317":"2317.TW","0050":"0050.TW","0056":"0056.TW","00878":"00878.TW","00919":"00919.TW"},
              "us": {"SPY":"SPY","QQQ":"QQQ","VOO":"VOO","SCHD":"SCHD","NVDA":"NVDA","TSLA":"TSLA"},
              "crypto": {"BTC":"BTC-USD","ETH":"ETH-USD"},
              "fx": {"USDTWD":"USDTWD=X","JPYTWD":"JPYTWD=X","EURTWD":"EURTWD=X"}
          }

          def get_quote(symbol):
              url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}?range=5d&interval=1d"
              req = urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=20) as r:
                  data = json.loads(r.read().decode("utf-8"))
              result = data["chart"]["result"][0]
              meta = result.get("meta", {})
              price = meta.get("regularMarketPrice") or meta.get("previousClose")
              prev = meta.get("previousClose") or price
              if price is None or prev is None:
                  return {"price":None,"change":None,"changePercent":None}
              change = price - prev
              pct = (change / prev * 100) if prev else 0
              return {"price":round(price,4),"change":round(change,4),"changePercent":round(pct,4)}

          def get_news():
              url = "https://news.google.com/rss/search?q=%E8%B2%A1%E7%B6%93+OR+%E5%8F%B0%E8%82%A1+OR+%E7%BE%8E%E8%82%A1+OR+%E9%BB%83%E9%87%91+OR+%E6%AF%94%E7%89%B9%E5%B9%A3&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
              out = []
              try:
                  req = urllib.request.Request(url, headers={"User-Agent":"Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=20) as r:
                      xml = r.read()
                  root = ET.fromstring(xml)
                  for item in root.findall(".//item")[:8]:
                      title = item.findtext("title") or ""
                      link = item.findtext("link") or ""
                      if title and link:
                          out.append({"title":title, "link":link})
              except Exception:
                  pass
              return out

          output = {
              "updated":"AUTO",
              "updated_tw":datetime.now(ZoneInfo("Asia/Taipei")).strftime("%m/%d %H:%M"),
              "taiwan":{},
              "us":{},
              "crypto":{},
              "fx":{},
              "gold":{},
              "news":[]
          }

          for group, symbols in STOCKS.items():
              for key, yahoo_symbol in symbols.items():
                  try:
                      q = get_quote(yahoo_symbol)
                      q["symbol"] = yahoo_symbol
                      output[group][key] = q
                  except Exception as e:
                      output[group][key] = {"price":None,"change":None,"changePercent":None,"error":str(e)[:120]}
                  time.sleep(0.2)

          try:
              gold = get_quote("GC=F")
              usd_twd_price = output["fx"].get("USDTWD", {}).get("price") or 31.5
              if gold.get("price"):
                  twd_per_gram = gold["price"] * usd_twd_price / 31.1034768
                  twd_per_tael = twd_per_gram * 37.5
              else:
                  twd_per_gram = None
                  twd_per_tael = None
              output["gold"] = {
                  "usd":gold.get("price"),
                  "twd":round(twd_per_gram,0) if twd_per_gram else None,
                  "tael":round(twd_per_tael,0) if twd_per_tael else None,
                  "change":gold.get("change"),
                  "changePercent":gold.get("changePercent"),
                  "usdTwd":usd_twd_price
              }
          except Exception as e:
              output["gold"] = {"usd":None,"twd":None,"tael":None,"changePercent":None,"error":str(e)[:120]}

          output["news"] = get_news()

          with open("market-data.json","w",encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add market-data.json
          git commit -m "Update realtime market data" || exit 0
          git push
