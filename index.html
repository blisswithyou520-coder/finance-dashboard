<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><title>每日財經 AI 儀表板 v3 終極版</title><style>:root{--bg:#050505;--card:#10100d;--line:#302a1f;--gold:#f3c653;--gold2:#b68c2d;--text:#f6f2e8;--muted:#a9a08f;--green:#22c55e;--red:#ef4444;--yellow:#facc15}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#2a210b 0,#050505 31%),linear-gradient(180deg,#050505,#0b0b09);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Arial,sans-serif}main{max-width:580px;margin:0 auto;padding:18px 14px 96px}.header{display:flex;align-items:center;justify-content:space-between;margin:8px 0 18px}.logo{display:flex;gap:12px;align-items:center}.logoIcon{width:48px;height:48px;border-radius:50%;background:var(--gold);color:#050505;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:900}h1{font-size:28px;margin:0;line-height:1.05}.en{color:var(--gold2);font-size:13px;letter-spacing:3px;margin-top:3px}.status{border:1px solid var(--line);border-radius:999px;padding:9px 14px;color:var(--muted);display:flex;align-items:center;gap:7px;background:#11100c}.dot{width:10px;height:10px;border-radius:50%;background:var(--green)}.card{background:linear-gradient(180deg,var(--card),#090907);border:1px solid var(--line);border-radius:24px;padding:18px;margin-bottom:18px;box-shadow:0 20px 45px #0008}.card h2{margin:0 0 14px;font-size:23px}.hero{display:grid;grid-template-columns:122px 1fr;gap:15px;align-items:center}.gauge{width:118px;height:82px;border:15px solid #2b2920;border-bottom:0;border-radius:118px 118px 0 0;position:relative;overflow:hidden}.gauge:before{content:"";position:absolute;left:-15px;top:-15px;width:118px;height:82px;border:15px solid var(--gold);border-bottom:0;border-radius:118px 118px 0 0;transform-origin:center bottom;transform:rotate(var(--rot,-35deg))}.score{position:absolute;bottom:-6px;left:0;right:0;text-align:center;font-size:31px;color:var(--gold);font-weight:900}.label{color:var(--muted);font-size:14px}.mood{font-size:22px;font-weight:900;margin:3px 0;color:var(--gold)}.desc{color:var(--muted);line-height:1.45}.actionTags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.tag{background:#241d0e;border:1px solid #453616;color:var(--gold);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.timeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}.timeGrid span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.timeGrid b{font-size:16px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.barRow{margin:12px 0}.barTop{display:flex;justify-content:space-between;margin-bottom:6px;font-weight:900}.barBg{height:12px;background:#242016;border:1px solid var(--line);border-radius:999px;overflow:hidden}.barFill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));width:0%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.miniCard{background:#0b0b08;border:1px solid var(--line);border-radius:18px;padding:14px}.miniCard b{font-size:17px}.miniCard .big{font-size:22px;font-weight:900;color:var(--gold);margin-top:8px}.rankCard{border:1px solid var(--line);border-radius:18px;padding:14px;background:#0b0b08;margin-bottom:10px}.rankCard h3{margin:0 0 10px;color:var(--gold);font-size:18px}.rankMeta{display:grid;grid-template-columns:1fr 1fr;gap:9px;font-size:13px;color:var(--muted)}.rankMeta b{display:block;color:var(--text);font-size:15px;margin-top:3px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #282318}.row:last-child{border-bottom:0}.name small{display:block;color:var(--muted);font-size:12px;margin-top:2px}.price{text-align:right;font-weight:800;font-size:17px}.change{display:block;font-size:13px;margin-top:3px}.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}.calcLine{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #282318}.calcLine:last-child{border-bottom:0}.calcLine span:first-child{color:var(--muted)}.newsItem{padding:12px 0;border-bottom:1px solid #282318;line-height:1.55}.newsItem a{color:var(--text);font-weight:800;text-decoration:none}.note{color:var(--muted);font-size:12px;line-height:1.6;margin-top:8px}.sigUp{color:var(--green)}.sigMid{color:var(--yellow)}.sigDown{color:var(--red)}.float{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:min(540px,calc(100% - 28px));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:10}.float button{border:0;background:var(--gold);color:#070706;border-radius:16px;padding:13px 16px;font-weight:900;box-shadow:0 14px 30px #0009}.float .dark{background:#1b1a13;color:var(--text);border:1px solid var(--line)}</style></head><body><main><div class="header"><div class="logo"><div class="logoIcon">菜</div><div><h1>每日財經<br>AI 儀表板 v3</h1><div class="en">ULTIMATE · FREE AUTO</div></div></div><div class="status"><span class="dot"></span> 自動</div></div><section class="card"><div class="hero"><div class="gauge" id="gauge"><div class="score" id="score">50</div></div><div><div class="label">菜市場情緒指數</div><div class="mood" id="mood">😐 靜觀其變</div><div class="desc" id="moodDesc">🤷 買錯也是平常價<br>👀 先看看再說</div><div class="actionTags" id="actionTags"></div></div></div><div class="timeGrid"><div><span>台灣時間</span><b id="twTime">--:--</b></div><div><span>美東時間</span><b id="nyTime">--:--</b></div><div><span>資料更新</span><b id="lastUpdate">--:--</b></div></div></section><section class="card"><h2>🔥 今日最熱</h2><div id="heatBars"></div></section><section class="card"><h2>🎯 AI 本月推薦 TOP 3</h2><div id="recommendations"></div><div class="note">懶人觀察版，不保證獲利；分批買，不梭哈。</div></section><section class="card"><h2>📊 我的投資總覽</h2><div id="assetSignals" class="grid2"></div></section><section class="card"><h2>⭐ 我的追蹤清單</h2><div id="watchList"></div></section><section class="card"><h2>📈 台股 ETF</h2><div id="twEtf"></div></section><section class="card"><h2>🇺🇸 美股 ETF</h2><div id="usEtf"></div></section><section class="card"><h2>🥇 黃金 / 加密</h2><div id="goldCrypto"></div><div id="goldTwdBox" style="margin-top:12px"></div></section><section class="card"><h2>🏦 本月活存王</h2><div id="savings"></div></section><section class="card"><h2>💎 基金排行榜</h2><div id="funds"></div></section><section class="card"><h2>📰 最新財經新聞</h2><div id="news"></div></section><section class="card"><h2>🤖 AI 分析今天</h2><div id="aiSummary"></div></section></main><div class="float"><button onclick="loadAll()">⚡ 重新整理</button><button class="dark" onclick="openChatGPT()">🤖 問 AI</button></div><script>const $=id=>document.getElementById(id);let DATA={};function fmt(n,d=2){const x=Number(n);return isFinite(x)?x.toLocaleString('zh-TW',{maximumFractionDigits:d}):'—'}function pct(n){const x=Number(n);if(!isFinite(x))return `<span class="change flat">—</span>`;const c=x>0?'up':x<0?'down':'flat';return `<span class="change ${c}">${x>0?'+':''}${x.toFixed(2)}%</span>`}function q(k){return DATA.quotes?.[k]||{name:k,symbol:k,price:null,percent:null}}function row(x){return `<div class="row"><div class="name">${x.name}<small>${x.symbol}</small></div><div class="price">${fmt(x.price,x.price>10000?0:2)}${pct(x.percent)}</div></div>`}function renderList(id,keys){$(id).innerHTML=keys.map(k=>row(q(k))).join('')}function updateClock(){const n=new Date();$('twTime').textContent=n.toLocaleTimeString('zh-TW',{timeZone:'Asia/Taipei',hour12:false,hour:'2-digit',minute:'2-digit'});$('nyTime').textContent=n.toLocaleTimeString('zh-TW',{timeZone:'America/New_York',hour12:false,hour:'2-digit',minute:'2-digit'})}function moodText(score){if(score>=80)return ['😍 在旁邊看戲，不要摻夥','💸 貴死了<br>⚠️ 小心被套在山頂',['👀 旁邊看戲','❌ 不梭哈','⚠️ 不追高']];if(score>=60)return ['😊 遇到颱風菜漲價','🌧️ 過陣子再買也不遲<br>🛒 不用急著搶',['✅ 定期定額','🚶 慢慢買','❌ 不追高']];if(score>=40)return ['😐 靜觀其變','🤷 買錯也是平常價<br>👀 先看看再說',['👀 先看戲','✅ 小買可','⏳ 等方向']];if(score>=20)return ['😨 過年大家吃團圓飯','🛒 可以買<br>💰 開始有便宜貨了',['🛒 可以買','💰 分批撿','✅ 看好再加']];return ['🥬 好菜頭大發財','🔥 好菜一堆沒人搶<br>🐷 不買等著當頭豬',['🔥 撿便宜','🛒 分批買','💰 長抱區']]}function calcScore(){const qs=Object.values(DATA.quotes||{}).filter(x=>isFinite(x.percent));const avg=qs.length?qs.reduce((a,b)=>a+Number(b.percent),0)/qs.length:0;const hot=(DATA.hotTopics||[]).filter(x=>Number(x.score)>0).length;return Math.round(Math.max(0,Math.min(100,50+avg*8+hot*2)))}function updateSentiment(){const score=calcScore();const [m,d,tags]=moodText(score);$('score').textContent=score;$('mood').textContent=m;$('moodDesc').innerHTML=d;$('gauge').style.setProperty('--rot',`${-70+score*1.4}deg`);$('actionTags').innerHTML=tags.map(t=>`<span class="tag">${t}</span>`).join('')}function renderHeat(){const hot=DATA.hotTopics||[];$('heatBars').innerHTML=hot.map((t,i)=>{let base=Number(t.score);let v=isFinite(base)?Math.min(100,55+base*12):[95,80,72,60,55][i]||50;return `<div class="barRow"><div class="barTop"><span>${t.emoji||'🔥'} ${t.topic}</span><span>${v}%</span></div><div class="barBg"><div class="barFill" style="width:${v}%"></div></div><div class="note">相關：${t.watch||''}</div></div>`}).join('')}function renderRecommendations(){const rec=(DATA.recommendations||[]).slice(0,3);$('recommendations').innerHTML=rec.map((r,i)=>`<div class="rankCard"><h3>${['🥇','🥈','🥉'][i]} ${r.type} ${r.name}</h3><div class="rankMeta"><div>勝率感覺<br><b>${[87,81,76][i]}%</b></div><div>建議金額<br><b>${r.amount}</b></div><div>進場<br><b>${r.entry}</b></div><div>出場<br><b>${r.exit}</b></div></div><div class="note">理由：${r.reason}</div></div>`).join('')}function signalText(keys){const arr=keys.map(k=>q(k).percent).filter(x=>isFinite(x));const avg=arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;if(avg>0.35)return ['偏多','sigUp','🟢'];if(avg<-0.35)return ['偏空','sigDown','🔴'];return ['觀望','sigMid','🟡']}function renderSignals(){const items=[['台股',['2330.TW','0050.TW','00878.TW']],['美股',['SPY','QQQ','NVDA']],['黃金',['GC=F']],['BTC',['BTC-USD']],['美元',['USDTWD=X']],['ETF',['0050.TW','VOO','QQQ']]];$('assetSignals').innerHTML=items.map(([name,keys])=>{const [s,c,e]=signalText(keys);return `<div class="miniCard"><b>${e} ${name}</b><div class="big ${c}">${s}</div></div>`}).join('')}function renderGoldTwd(){const g=q('GC=F'),usd=q('USDTWD=X');if(!g.price||!usd.price){$('goldTwdBox').innerHTML='<div class="note">黃金台幣換算資料更新中</div>';return}const oz=g.price*usd.price,gram=oz/31.1034768,mace=gram*3.75,tael=mace*10;$('goldTwdBox').innerHTML=`<div class="calcLine"><span>黃金 USD/oz</span><b>${fmt(g.price,2)}</b></div><div class="calcLine"><span>台幣 / 克</span><b>${fmt(gram,0)} 元</b></div><div class="calcLine"><span>台幣 / 錢</span><b>${fmt(mace,0)} 元</b></div><div class="calcLine"><span>台幣 / 兩</span><b>${fmt(tael,0)} 元</b></div>`}function renderSavings(){const list=DATA.savings||[];$('savings').innerHTML=list.map((x,i)=>`<div class="row"><div class="name">${i===0?'🏆 ':''}${x.name}<small>${x.note||'依官方公告為準'}</small></div><div class="price">${x.rate}</div></div>`).join('')}function renderFunds(){const f=DATA.funds||[];$('funds').innerHTML=f.map(x=>`<div class="row"><div class="name">${x.name}<small>${x.type}</small></div><div class="price">${x.percent}</div></div>`).join('')}function renderNews(){const ns=(DATA.news||[]).slice(0,5);$('news').innerHTML=ns.length?ns.map(n=>`<div class="newsItem"><a href="${n.link}" target="_blank">📰 ${n.title}</a><p>${n.source||''}</p></div>`).join(''):'<div class="note">新聞更新中</div>'}function renderAISummary(){const score=calcScore();const [m]=moodText(score);const sigUs=signalText(['SPY','QQQ','NVDA'])[0],sigTw=signalText(['2330.TW','0050.TW'])[0],sigGold=signalText(['GC=F'])[0];$('aiSummary').innerHTML=`<div class="calcLine"><span>今天市場</span><b>${m}</b></div><div class="calcLine"><span>美股</span><b>${sigUs}</b></div><div class="calcLine"><span>台股</span><b>${sigTw}</b></div><div class="calcLine"><span>黃金</span><b>${sigGold}</b></div><div class="note">今天結論：先看菜價，不追高；便宜區分批撿。</div>`}async function loadAll(){updateClock();try{DATA=await fetch('market-data.json?ts='+Date.now()).then(r=>r.json())}catch(e){DATA={quotes:{},news:[],hotTopics:[],recommendations:[]}}renderHeat();renderRecommendations();renderSignals();renderList('watchList',['0050.TW','2330.TW','00878.TW','GC=F','BTC-USD','USDTWD=X']);renderList('twEtf',['0050.TW','006208.TW','0056.TW','00878.TW','00919.TW','00929.TW']);renderList('usEtf',['QQQ','SPY','VOO','VTI','SCHD','VYM']);renderList('goldCrypto',['GC=F','BTC-USD','ETH-USD','SOL-USD','XRP-USD']);renderGoldTwd();renderSavings();renderFunds();renderNews();renderAISummary();updateSentiment();$('lastUpdate').textContent=DATA.updated_tw||'--:--'}function openChatGPT(){const prompt=`請用繁體中文、菜市場白話分析今天市場。情緒指數：${$('score').textContent}，${$('mood').textContent}。請給我今天錢該放哪裡：台股、美股、ETF、黃金、BTC，各自進場、出場、建議金額。新聞：${(DATA.news||[]).slice(0,5).map(x=>x.title).join(' / ')}`;location.href=`https://chat.openai.com/?q=${encodeURIComponent(prompt)}`}loadAll();setInterval(updateClock,1000);</script></body></html>
