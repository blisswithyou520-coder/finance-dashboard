<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>每日財經 AI 儀表板 v3.1 修正版</title>
<style>
:root{--bg:#050505;--card:#10100d;--line:#302a1f;--gold:#f3c653;--gold2:#b68c2d;--text:#f6f2e8;--muted:#a9a08f;--green:#22c55e;--red:#ef4444;--yellow:#facc15}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#2a210b 0,#050505 32%),#050505;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Arial,sans-serif}
main{max-width:580px;margin:0 auto;padding:18px 14px 96px}
.header{display:flex;justify-content:space-between;align-items:center;margin:8px 0 18px}
.logo{display:flex;gap:12px;align-items:center}.logoIcon{width:48px;height:48px;border-radius:50%;background:var(--gold);color:#050505;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:900}
h1{font-size:28px;margin:0;line-height:1.05}.en{color:var(--gold2);font-size:13px;letter-spacing:3px;margin-top:3px}
.status{border:1px solid var(--line);border-radius:999px;padding:9px 14px;color:var(--muted);display:flex;gap:7px;align-items:center;background:#11100c}.dot{width:10px;height:10px;background:var(--green);border-radius:50%}
.card{background:linear-gradient(180deg,var(--card),#090907);border:1px solid var(--line);border-radius:24px;padding:18px;margin-bottom:18px;box-shadow:0 20px 45px #0008}
.card h2{margin:0 0 14px;font-size:23px}
.hero{display:grid;grid-template-columns:120px 1fr;gap:15px;align-items:center}
.gauge{width:116px;height:80px;border:15px solid #2b2920;border-bottom:0;border-radius:116px 116px 0 0;position:relative;overflow:hidden}
.gauge:before{content:"";position:absolute;left:-15px;top:-15px;width:116px;height:80px;border:15px solid var(--gold);border-bottom:0;border-radius:116px 116px 0 0;transform-origin:center bottom;transform:rotate(var(--rot,-35deg))}
.score{position:absolute;bottom:-6px;left:0;right:0;text-align:center;font-size:30px;color:var(--gold);font-weight:900}
.label{color:var(--muted);font-size:14px}.mood{font-size:22px;font-weight:900;margin:4px 0;color:var(--gold)}.desc{color:var(--muted);line-height:1.45}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.tag{background:#241d0e;border:1px solid #453616;color:var(--gold);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}
.timeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.timeGrid span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.timeGrid b{font-size:16px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{background:#0b0b08;border:1px solid var(--line);border-radius:18px;padding:14px}.mini b{font-size:17px}.big{font-size:22px;font-weight:900;color:var(--gold);margin-top:8px}
.row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #282318}.row:last-child{border-bottom:0}
.name small{display:block;color:var(--muted);font-size:12px;margin-top:2px}.price{text-align:right;font-weight:900;font-size:18px}.sub{display:block;color:var(--muted);font-size:13px;margin-top:3px}
.calc{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #282318}.calc:last-child{border-bottom:0}.calc span{color:var(--muted)}.calc b{font-size:17px}
.barRow{margin:12px 0}.barTop{display:flex;justify-content:space-between;font-weight:900;margin-bottom:6px}.barBg{height:12px;border-radius:999px;background:#242016;border:1px solid var(--line);overflow:hidden}.barFill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold))}
.float{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:min(540px,calc(100% - 28px));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:10}
.float button{border:0;background:var(--gold);color:#070706;border-radius:16px;padding:13px 16px;font-weight:900;box-shadow:0 14px 30px #0009}.float .dark{background:#1b1a13;color:var(--text);border:1px solid var(--line)}
.note{color:var(--muted);font-size:13px;line-height:1.6}
</style>
</head>
<body>
<main>
  <div class="header"><div class="logo"><div class="logoIcon">菜</div><div><h1>每日財經<br>AI 儀表板 v3.1</h1><div class="en">FIXED · READ JSON</div></div></div><div class="status"><span class="dot"></span> 自動</div></div>

  <section class="card"><div class="hero"><div class="gauge" id="gauge"><div class="score" id="score">50</div></div><div><div class="label">菜市場情緒指數</div><div class="mood" id="mood">😐 靜觀其變</div><div class="desc" id="moodDesc">🤷 買錯也是平常價<br>👀 先看看再說</div><div class="tags" id="tags"></div></div></div><div class="timeGrid"><div><span>台灣時間</span><b id="twTime">--:--</b></div><div><span>美東時間</span><b id="nyTime">--:--</b></div><div><span>資料更新</span><b id="lastUpdate">--</b></div></div></section>

  <section class="card"><h2>🔥 今日最熱</h2><div id="heat"></div></section>
  <section class="card"><h2>🎯 AI 本月推薦 TOP 3</h2><div id="rec"></div></section>
  <section class="card"><h2>📊 我的投資總覽</h2><div class="grid2" id="overview"></div></section>
  <section class="card"><h2>⭐ 我的追蹤清單</h2><div id="watch"></div></section>
  <section class="card"><h2>📈 台股 / ETF</h2><div id="tw"></div></section>
  <section class="card"><h2>🇺🇸 美股 / ETF</h2><div id="us"></div></section>
  <section class="card"><h2>🥇 黃金 / 加密</h2><div id="goldCrypto"></div></section>
  <section class="card"><h2>🏦 活存利率</h2><div id="saving"></div></section>
  <section class="card"><h2>💎 基金排行榜</h2><div id="funds"></div></section>
  <section class="card"><h2>📰 最新財經新聞</h2><div id="news"></div></section>
  <section class="card"><h2>🤖 AI 分析今天</h2><div id="ai"></div></section>
</main>
<div class="float"><button onclick="loadAll()">⚡ 重新整理</button><button class="dark" onclick="openChatGPT()">🤖 問 AI</button></div>

<script>
let DATA={};const $=id=>document.getElementById(id);
function fmt(n,d=2){const x=Number(n);return isFinite(x)?x.toLocaleString("zh-TW",{maximumFractionDigits:d}):"—"}
function pct(n){return `<span class="sub">${Number(n)>0?"+":""}${fmt(n,2)}%</span>`}
function updateClock(){const n=new Date();$("twTime").textContent=n.toLocaleTimeString("zh-TW",{timeZone:"Asia/Taipei",hour12:false,hour:"2-digit",minute:"2-digit"});$("nyTime").textContent=n.toLocaleTimeString("zh-TW",{timeZone:"America/New_York",hour12:false,hour:"2-digit",minute:"2-digit"})}
function moodText(score){if(score>=80)return["😍 在旁邊看戲，不要摻夥","💸 貴死了<br>⚠️ 小心被套在山頂",["👀 旁邊看戲","❌ 不追高"]];if(score>=60)return["😊 遇到颱風菜漲價","🌧️ 過陣子再買也不遲<br>🛒 不用急著搶",["✅ 定期定額","🚶 慢慢買"]];if(score>=40)return["😐 靜觀其變","🤷 買錯也是平常價<br>👀 先看看再說",["👀 先看戲","✅ 小買可"]];if(score>=20)return["😨 過年大家吃團圓飯","🛒 可以買<br>💰 開始有便宜貨了",["🛒 可以買","💰 分批撿"]];return["🥬 好菜頭大發財","🔥 好菜一堆沒人搶<br>🐷 不買等著當頭豬",["🔥 撿便宜","🛒 分批買"]]}
function getPrice(type,key){return Number(DATA[type]?.[key] ?? 0)}
function row(name,symbol,price,percent=0){return `<div class="row"><div class="name">${name}<small>${symbol}</small></div><div class="price">${fmt(price, price>10000?0:2)}${pct(percent)}</div></div>`}
function calcScore(){const vals=[...Object.values(DATA.taiwan||{}),...Object.values(DATA.us||{}),DATA.gold?.usd,DATA.crypto?.BTC].map(Number).filter(Boolean);let score=50;if(vals.length)score=54;return score}
function updateMood(){const score=calcScore();const [m,d,t]=moodText(score);$("score").textContent=score;$("mood").textContent=m;$("moodDesc").innerHTML=d;$("tags").innerHTML=t.map(x=>`<span class="tag">${x}</span>`).join("");$("gauge").style.setProperty("--rot",`${-70+score*1.4}deg`)}
function renderHeat(){const items=[["🔥 AI / 半導體",95],["🟡 聯準會 / 降息",80],["🟡 台股電子股",74],["🥇 黃金避險",65],["₿ 比特幣 / 加密",62]];$("heat").innerHTML=items.map(([n,v])=>`<div class="barRow"><div class="barTop"><span>${n}</span><span>${v}%</span></div><div class="barBg"><div class="barFill" style="width:${v}%"></div></div></div>`).join("")}
function renderRec(){$("rec").innerHTML=`<div class="mini"><b>🥇 🇺🇸 美股 QQQ</b><div class="big">${fmt(getPrice("us","QQQ"))}</div><div class="note">建議 50,000 內分批｜回檔 3~5%｜出場 +10~15%</div></div><br><div class="mini"><b>🥈 🇹🇼 台股 0050</b><div class="big">${fmt(getPrice("taiwan","0050"))}</div><div class="note">建議 30,000 內分批｜靠近月線｜長期配置</div></div><br><div class="mini"><b>🥉 🥇 黃金</b><div class="big">${fmt(DATA.gold?.tael,0)} / 兩</div><div class="note">建議 20,000 內分批｜避險配置｜不要追高</div></div>`}
function renderOverview(){const tw=getPrice("taiwan","0050"), us=getPrice("us","QQQ"), g=Number(DATA.gold?.usd||0), btc=getPrice("crypto","BTC");const items=[["台股",tw?"可觀察":"待更新"],["美股",us?"可觀察":"待更新"],["黃金",g?"避險配置":"待更新"],["BTC",btc?"高波動":"待更新"],["美元",DATA.gold?.twd?"觀察匯率":"待更新"],["ETF",tw&&us?"分批配置":"待更新"]];$("overview").innerHTML=items.map(([a,b])=>`<div class="mini"><b>🟡 ${a}</b><div class="big">${b}</div></div>`).join("")}
function renderLists(){
 $("watch").innerHTML=row("0050 元大台灣50","0050",getPrice("taiwan","0050"))+row("台積電","2330",getPrice("taiwan","2330"))+row("00878 國泰永續高股息","00878",getPrice("taiwan","00878"))+row("黃金","USD/oz",DATA.gold?.usd)+row("比特幣","BTC",getPrice("crypto","BTC"));
 $("tw").innerHTML=row("0050 元大台灣50","0050",getPrice("taiwan","0050"))+row("0056 元大高股息","0056",getPrice("taiwan","0056"))+row("00878 國泰永續高股息","00878",getPrice("taiwan","00878"))+row("2330 台積電","2330",getPrice("taiwan","2330"))+row("2454 聯發科","2454",getPrice("taiwan","2454"))+row("2317 鴻海","2317",getPrice("taiwan","2317"));
 $("us").innerHTML=row("SPY 標普500","SPY",getPrice("us","SPY"))+row("QQQ 那斯達克","QQQ",getPrice("us","QQQ"))+row("NVDA 輝達","NVDA",getPrice("us","NVDA"))+row("TSLA 特斯拉","TSLA",getPrice("us","TSLA"));
}
function renderGold(){$("goldCrypto").innerHTML=`<div class="calc"><span>黃金 USD/oz</span><b>${fmt(DATA.gold?.usd,2)}</b></div><div class="calc"><span>黃金台幣</span><b>${fmt(DATA.gold?.twd,0)}</b></div><div class="calc"><span>黃金每兩</span><b>${fmt(DATA.gold?.tael,0)}</b></div><div class="calc"><span>BTC</span><b>${fmt(DATA.crypto?.BTC,0)}</b></div><div class="calc"><span>ETH</span><b>${fmt(DATA.crypto?.ETH,0)}</b></div>`}
function renderOther(){ $("saving").innerHTML=`<div class="calc"><span>LINE Bank</span><b>1.50%</b></div><div class="calc"><span>將來銀行</span><b>1.50%</b></div><div class="calc"><span>Richart</span><b>1.30%</b></div><div class="note">活動利率會變動，實際依官方公告。</div>`;$("funds").innerHTML=`<div class="calc"><span>台灣基金王</span><b>安聯台灣科技</b></div><div class="calc"><span>美國基金王</span><b>Vanguard Growth</b></div><div class="note">基金資料先做觀察清單，後續可再接資料源。</div>`;$("news").innerHTML=`<div class="note">新聞標題下一版接 Google News RSS。現在先以行情決策為主。</div>`;$("ai").innerHTML=`<div class="note">今天結論：看菜市場指數，不追高；QQQ、0050、黃金分批觀察。BTC 波動大，小額就好。</div>`}
async function loadAll(){updateClock();try{DATA=await fetch("market-data.json?ts="+Date.now()).then(r=>r.json())}catch(e){DATA={taiwan:{},us:{},gold:{},crypto:{}}}$("lastUpdate").textContent=DATA.updated||"AUTO";updateMood();renderHeat();renderRec();renderOverview();renderLists();renderGold();renderOther()}
function openChatGPT(){location.href="https://chat.openai.com/?q="+encodeURIComponent("請用菜市場白話分析今天財經儀表板，並給我台股、美股、ETF、黃金、BTC 建議。")}
loadAll();setInterval(updateClock,1000);
</script>
</body>
</html>
