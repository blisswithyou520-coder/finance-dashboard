<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>每日財經 AI 儀表板 v2</title>
<style>
:root{
  --bg:#050505;--card:#10100d;--card2:#181812;--line:#302a1f;
  --gold:#f3c653;--gold2:#b68c2d;--text:#f6f2e8;--muted:#a9a08f;
  --green:#22c55e;--red:#ef4444;--yellow:#facc15;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#2a210b 0,#050505 30%),linear-gradient(180deg,#050505,#0b0b09);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Arial,sans-serif}
main{max-width:560px;margin:0 auto;padding:18px 14px 96px}
.header{display:flex;align-items:center;justify-content:space-between;margin:8px 0 18px}
.logo{display:flex;gap:12px;align-items:center}
.logoIcon{width:48px;height:48px;border-radius:50%;background:var(--gold);color:#050505;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:900}
h1{font-size:28px;margin:0;line-height:1.05}.en{color:var(--gold2);font-size:13px;letter-spacing:3px;margin-top:3px}
.status{border:1px solid var(--line);border-radius:999px;padding:9px 14px;color:var(--muted);display:flex;align-items:center;gap:7px;background:#11100c}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green)}
.card{background:linear-gradient(180deg,var(--card),#090907);border:1px solid var(--line);border-radius:24px;padding:18px;margin-bottom:18px;box-shadow:0 20px 45px #0008}
.card h2{margin:0 0 14px;font-size:23px;display:flex;align-items:center;gap:8px}
.hero{display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:center}
.gauge{width:116px;height:80px;border:15px solid #2b2920;border-bottom:0;border-radius:116px 116px 0 0;position:relative;overflow:hidden}
.gauge:before{content:"";position:absolute;left:-15px;top:-15px;width:116px;height:80px;border:15px solid var(--gold);border-bottom:0;border-radius:116px 116px 0 0;transform-origin:center bottom;transform:rotate(var(--rot,-35deg))}
.score{position:absolute;bottom:-6px;left:0;right:0;text-align:center;font-size:30px;color:var(--gold);font-weight:900}
.heroText .label{color:var(--muted);font-size:14px}.mood{font-size:22px;font-weight:900;margin:3px 0;color:var(--gold)}.desc{color:var(--muted);line-height:1.45}
.timeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.timeGrid span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.timeGrid b{font-size:16px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #282318}
.row:last-child{border-bottom:0}.name small{display:block;color:var(--muted);font-size:12px;margin-top:2px}.price{text-align:right;font-weight:800;font-size:17px}.change{display:block;font-size:13px;margin-top:3px}.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.miniCard{background:#0b0b08;border:1px solid var(--line);border-radius:18px;padding:14px}.miniCard .big{font-size:22px;font-weight:900;color:var(--gold);margin-top:8px}
.note{color:var(--muted);font-size:12px;line-height:1.6;margin-top:8px}
.hotGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hotBox{background:#0b0b08;border:1px solid var(--line);border-radius:18px;padding:13px}.hotBox b{display:block;font-size:16px;margin-bottom:6px}.hotBox small{color:var(--muted);line-height:1.5}.stars{color:var(--gold);font-size:13px;margin-top:6px}
.recBox{border:1px solid var(--line);border-radius:18px;padding:14px;background:#0b0b08;margin-bottom:10px}.recBox h3{margin:0 0 8px;color:var(--gold);font-size:17px}.recMeta{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;color:var(--muted)}.recMeta b{color:var(--text);font-size:15px}
.calcLine{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #282318}.calcLine:last-child{border-bottom:0}.calcLine span:first-child{color:var(--muted)}
.newsItem{padding:12px 0;border-bottom:1px solid #282318;line-height:1.55}.newsItem:last-child{border-bottom:0}.newsItem a{color:var(--text);font-weight:800;text-decoration:none}.newsItem p{color:var(--muted);font-size:13px;margin:4px 0 0}
.float{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:min(520px,calc(100% - 28px));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:10}
.float button{border:0;background:var(--gold);color:#070706;border-radius:16px;padding:13px 16px;font-weight:900;box-shadow:0 14px 30px #0009}.float .dark{background:#1b1a13;color:var(--text);border:1px solid var(--line)}
</style>
</head>
<body>
<main>
<div class="header">
  <div class="logo"><div class="logoIcon">菜</div><div><h1>每日財經<br>AI 儀表板 v2</h1><div class="en">FREE AUTO · YAHOO DATA</div></div></div>
  <div class="status"><span class="dot"></span> 自動</div>
</div>

<section class="card">
  <div class="hero">
    <div class="gauge" id="gauge"><div class="score" id="score">50</div></div>
    <div class="heroText">
      <div class="label">菜市場情緒指數</div>
      <div class="mood" id="mood">😐 靜觀其變</div>
      <div class="desc" id="moodDesc">🤷 買錯也是平常價<br>👀 先看看再說</div>
    </div>
  </div>
  <div class="timeGrid">
    <div><span>台灣時間</span><b id="twTime">--:--</b></div>
    <div><span>美東時間</span><b id="nyTime">--:--</b></div>
    <div><span>資料更新</span><b id="lastUpdate">--:--</b></div>
  </div>
</section>

<section class="card"><h2>🎯 AI 本月推薦</h2><div id="recommendations"></div><div class="note">僅供觀察，不保證獲利；請分批、控制風險。</div></section>
<section class="card"><h2>⭐ 我的追蹤清單</h2><div id="watchList"></div></section>
<section class="card"><h2>🔥 時事熱門觀察</h2><div id="hotNewsMarket"></div></section>
<section class="card"><h2>🇺🇸 美股專區</h2><div id="usMarket"></div></section>
<section class="card"><h2>🇹🇼 台股重點</h2><div id="twMarket"></div></section>
<section class="card"><h2>📈 ETF 專區</h2><div id="etfMarket"></div></section>
<section class="card"><h2>🥇 黃金 / 加密貨幣</h2><div id="goldCrypto"></div></section>
<section class="card"><h2>🥇 黃金台幣換算</h2><div id="goldTwdBox"></div></section>
<section class="card"><h2>💱 匯率＋活存利率</h2><div id="fxMarket"></div></section>
<section class="card"><h2>🇹🇼 台灣基金</h2><div id="twFunds"></div></section>
<section class="card"><h2>🇺🇸 美國基金</h2><div id="usFunds"></div></section>
<section class="card"><h2>📰 最新財經新聞</h2><div id="news"></div><div class="note">只顯示標題，想看再點進去。</div></section>
</main>

<div class="float"><button onclick="loadAll()">⚡ 重新整理</button><button class="dark" onclick="openChatGPT()">🤖 AI 分析今天</button></div>

<script>
const $=id=>document.getElementById(id);let DATA={};
function fmt(n,d=2){const x=Number(n);return isFinite(x)?x.toLocaleString("zh-TW",{maximumFractionDigits:d}):"—"}
function pct(n){const x=Number(n);if(!isFinite(x))return `<span class="change flat">—</span>`;const c=x>0?"up":x<0?"down":"flat";return `<span class="change ${c}">${x>0?"+":""}${x.toFixed(2)}%</span>`}
function q(k){return DATA.quotes?.[k]||{name:k,symbol:k,price:null,percent:null}}
function row(x){return `<div class="row"><div class="name">${x.name}<small>${x.symbol}</small></div><div class="price">${fmt(x.price,x.price>10000?0:2)}${pct(x.percent)}</div></div>`}
function renderList(id,keys){$(id).innerHTML=keys.map(k=>row(q(k))).join("")}
function updateClock(){const n=new Date();$("twTime").textContent=n.toLocaleTimeString("zh-TW",{timeZone:"Asia/Taipei",hour12:false,hour:"2-digit",minute:"2-digit"});$("nyTime").textContent=n.toLocaleTimeString("zh-TW",{timeZone:"America/New_York",hour12:false,hour:"2-digit",minute:"2-digit"})}
function moodText(score){
 if(score>=80)return ["😍 在旁邊看戲，不要摻夥","💸 貴死了<br>⚠️ 小心被套在山頂"];
 if(score>=60)return ["😊 遇到颱風菜漲價","🌧️ 過陣子再買也不遲<br>🛒 不用急著搶"];
 if(score>=40)return ["😐 靜觀其變","🤷 買錯也是平常價<br>👀 先看看再說"];
 if(score>=20)return ["😨 過年大家吃團圓飯","🛒 可以買<br>💰 開始有便宜貨了"];
 return ["🥬 好菜頭大發財","🔥 好菜一堆沒人搶<br>🐷 不買等著當頭豬"];
}
function updateSentiment(){
 const qs=Object.values(DATA.quotes||{}).filter(x=>isFinite(x.percent));
 const avg=qs.length?qs.reduce((a,b)=>a+Number(b.percent),0)/qs.length:0;
 const hot=(DATA.hotTopics||[]).filter(x=>Number(x.score)>0).length;
 const score=Math.round(Math.max(0,Math.min(100,50+avg*8+hot*2)));
 const [m,d]=moodText(score);
 $("score").textContent=score;$("mood").textContent=m;$("moodDesc").innerHTML=d;$("gauge").style.setProperty("--rot",`${-70+score*1.4}deg`);
}
function stars(n){return "★★★★★☆☆☆☆☆".slice(5-n,10-n)}
function renderHot(){const hot=DATA.hotTopics||[];$("hotNewsMarket").innerHTML=`<div class="hotGrid">${hot.map(t=>`<div class="hotBox"><b>${t.emoji||"🔥"} ${t.topic}</b><small>相關觀察：${t.watch||"市場大盤"}<br>新聞熱度：${t.score||"觀察中"}</small><div class="stars">${stars(t.level||3)}</div></div>`).join("")}</div>`}
function renderRecommendations(){const rec=DATA.recommendations||[];$("recommendations").innerHTML=rec.map(r=>`<div class="recBox"><h3>${r.type} ${r.name}</h3><div class="recMeta"><div>建議金額<br><b>${r.amount}</b></div><div>進場<br><b>${r.entry}</b></div><div>出場/目標<br><b>${r.exit}</b></div><div>理由<br><b>${r.reason}</b></div></div></div>`).join("")}
function renderGoldTwd(){const g=q("GC=F"), usd=q("USDTWD=X");if(!g.price||!usd.price){$("goldTwdBox").innerHTML=`<div class="note">資料更新中</div>`;return}const oz=g.price*usd.price,gram=oz/31.1034768,mace=gram*3.75,tael=mace*10;$("goldTwdBox").innerHTML=`<div class="calcLine"><span>國際金價</span><b>${fmt(g.price,2)} USD/oz</b></div><div class="calcLine"><span>美元匯率</span><b>${fmt(usd.price,4)} TWD</b></div><div class="calcLine"><span>每公克</span><b>${fmt(gram,0)} 元</b></div><div class="calcLine"><span>每錢</span><b>${fmt(mace,0)} 元</b></div><div class="calcLine"><span>每兩</span><b>${fmt(tael,0)} 元</b></div>`}
function renderFx(){const rates=DATA.rates||[];$("fxMarket").innerHTML=rates.map(r=>`<div class="row"><div class="name">${r.name}<small>活存利率：${r.savings}</small></div><div class="price">${fmt(r.price,4)}</div></div>`).join("")}
function renderNews(){const ns=(DATA.news||[]).slice(0,8);$("news").innerHTML=ns.length?ns.map(n=>`<div class="newsItem"><a href="${n.link}" target="_blank">${n.title}</a><p>${n.source||""}</p></div>`).join(""):`<div class="note">新聞更新中</div>`}
async function loadAll(){
 updateClock();
 try{DATA=await fetch("market-data.json?ts="+Date.now()).then(r=>r.json())}catch(e){DATA={quotes:{},news:[],hotTopics:[],recommendations:[],rates:[]}}
 renderRecommendations();
 renderList("watchList",["0050.TW","2330.TW","00878.TW","GC=F","BTC-USD","USDTWD=X"]);
 renderHot();
 renderList("usMarket",["SPY","QQQ","DIA","NVDA","TSLA","AAPL"]);
 renderList("twMarket",["2330.TW","2454.TW","2317.TW","2382.TW","3231.TW"]);
 renderList("etfMarket",["0050.TW","0056.TW","00878.TW","00919.TW","00929.TW"]);
 renderList("goldCrypto",["GC=F","BTC-USD","ETH-USD","SOL-USD","XRP-USD"]);
 renderGoldTwd();renderFx();
 renderList("twFunds",["TW_FUND_1","TW_FUND_2","TW_FUND_3"]);
 renderList("usFunds",["VTI","VOO","QQQ"]);
 renderNews();updateSentiment();$("lastUpdate").textContent=DATA.updated_tw||"--:--";
}
function openChatGPT(){const prompt=`請用繁體中文用菜市場白話幫我分析今天市場。市場情緒：${$("score").textContent}，${$("mood").textContent}。熱門題材：${(DATA.hotTopics||[]).map(x=>x.topic).join("、")}。新聞：${(DATA.news||[]).slice(0,5).map(x=>x.title).join(" / ")}。請給我本月最推薦：美股、台股、ETF、黃金、加密貨幣，並寫進場價、出場價、建議金額。`;location.href=`https://chat.openai.com/?q=${encodeURIComponent(prompt)}`}
loadAll();setInterval(updateClock,1000);
</script>
</body>
</html>
