<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>每日財經 AI 儀表板 V5</title>
<style>
:root{--bg:#050505;--card:#10100d;--line:#302a1f;--gold:#f3c653;--gold2:#b68c2d;--text:#f6f2e8;--muted:#a9a08f;--green:#22c55e;--red:#ef4444;--blue:#60a5fa}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top left,#2a210b 0,#050505 34%),#050505;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Arial,sans-serif}
main{max-width:640px;margin:0 auto;padding:18px 14px 96px}
.header{display:flex;justify-content:space-between;align-items:center;margin:8px 0 18px}
.logo{display:flex;gap:12px;align-items:center}.logoIcon{width:48px;height:48px;border-radius:50%;background:var(--gold);color:#050505;display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:900}
h1{font-size:28px;margin:0;line-height:1.05}.en{color:var(--gold2);font-size:13px;letter-spacing:3px;margin-top:3px}
.status{border:1px solid var(--line);border-radius:999px;padding:9px 14px;color:var(--muted);display:flex;gap:7px;align-items:center;background:#11100c}.dot{width:10px;height:10px;background:var(--green);border-radius:50%}
.card{background:linear-gradient(180deg,var(--card),#090907);border:1px solid var(--line);border-radius:24px;padding:18px;margin-bottom:18px;box-shadow:0 20px 45px #0008}
.card h2{margin:0 0 14px;font-size:23px}
.hero{display:grid;grid-template-columns:120px 1fr;gap:15px;align-items:center}
.gauge{width:116px;height:80px;border:15px solid #2b2920;border-bottom:0;border-radius:116px 116px 0 0;position:relative;overflow:hidden}
.gauge:before{content:"";position:absolute;left:-15px;top:-15px;width:116px;height:80px;border:15px solid var(--gold);border-bottom:0;border-radius:116px 116px 0 0;transform-origin:center bottom;transform:rotate(var(--rot,-35deg))}
.score{position:absolute;bottom:-6px;left:0;right:0;text-align:center;font-size:30px;color:var(--gold);font-weight:900}
.label{color:var(--muted);font-size:14px}.mood{font-size:22px;font-weight:900;margin:4px 0;color:var(--gold)}.desc{color:var(--muted);line-height:1.45}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.tag{background:#241d0e;border:1px solid #453616;color:var(--gold);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}
.timeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.timeGrid span{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.timeGrid b{font-size:16px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{background:#0b0b08;border:1px solid var(--line);border-radius:18px;padding:14px}.mini b{font-size:17px}.big{font-size:22px;font-weight:900;color:var(--gold);margin-top:8px}
.row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #282318}.row:last-child{border-bottom:0}
.name small{display:block;color:var(--muted);font-size:12px;margin-top:2px}.price{text-align:right;font-weight:900;font-size:18px}.sub{display:block;font-size:13px;margin-top:3px}.up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--muted)}
.calc{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #282318}.calc:last-child{border-bottom:0}.calc span{color:var(--muted)}.calc b{font-size:17px;text-align:right}
.barRow{margin:12px 0}.barTop{display:flex;justify-content:space-between;font-weight:900;margin-bottom:6px}.barBg{height:12px;border-radius:999px;background:#242016;border:1px solid var(--line);overflow:hidden}.barFill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold))}
.news a{display:block;color:var(--text);text-decoration:none;font-weight:800;padding:10px 0;border-bottom:1px solid #282318}.news a:last-child{border-bottom:0}
.float{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);width:min(600px,calc(100% - 28px));display:grid;grid-template-columns:1fr 1fr;gap:10px;z-index:10}
.float button{border:0;background:var(--gold);color:#070706;border-radius:16px;padding:13px 16px;font-weight:900}.float .dark{background:#1b1a13;color:var(--text);border:1px solid var(--line)}
.note{color:var(--muted);font-size:13px;line-height:1.6}
</style>
</head>
<body>
<main>
<div class="header"><div class="logo"><div class="logoIcon">菜</div><div><h1>每日財經<br>AI 儀表板 V5</h1><div class="en">ULTIMATE · AUTO · FREE</div></div></div><div class="status"><span class="dot"></span> 自動</div></div>

<section class="card"><div class="hero"><div class="gauge" id="gauge"><div class="score" id="score">50</div></div><div><div class="label">菜市場情緒指數</div><div class="mood" id="mood">讀取中</div><div class="desc" id="moodDesc">資料更新中</div><div class="tags" id="tags"></div></div></div><div class="timeGrid"><div><span>台灣時間</span><b id="twTime">--:--</b></div><div><span>美東時間</span><b id="nyTime">--:--</b></div><div><span>資料更新</span><b id="lastUpdate">--</b></div></div></section>
<section class="card"><h2>🤖 AI 今日一句</h2><div id="todayLine" class="note">讀取中...</div></section>
<section class="card"><h2>🔥 熱門觀察</h2><div id="heat"></div></section>
<section class="card"><h2>🎯 本月推薦配置</h2><div id="rec"></div></section>
<section class="card"><h2>📊 我的投資總覽</h2><div class="grid2" id="overview"></div></section>
<section class="card"><h2>📈 台股 / ETF</h2><div id="tw"></div></section>
<section class="card"><h2>🇺🇸 美股 / ETF</h2><div id="us"></div></section>
<section class="card"><h2>🥇 黃金 / 匯率 / 加密</h2><div id="goldCrypto"></div></section>
<section class="card"><h2>💱 主要匯率</h2><div id="fx"></div></section>
<section class="card"><h2>🏦 活存利率觀察</h2><div id="saving"></div></section>
<section class="card"><h2>📅 ETF 配息觀察</h2><div id="dividend"></div></section>
<section class="card"><h2>💎 基金觀察</h2><div id="funds"></div></section>
<section class="card"><h2>📰 最新財經新聞</h2><div id="news" class="news"></div></section>
<section class="card"><h2>⭐ 我的追蹤清單</h2><div id="watch"></div></section>
</main>
<div class="float"><button onclick="loadAll()">⚡ 重新整理</button><button class="dark" onclick="openChatGPT()">🤖 問 AI</button></div>

<script>
let DATA={};const $=id=>document.getElementById(id);
function fmt(n,d=2){const x=Number(n);return isFinite(x)?x.toLocaleString("zh-TW",{maximumFractionDigits:d}):"—"}
function item(g,k){const v=DATA[g]?.[k];if(v&&typeof v==="object")return v;if(v!==undefined)return{price:v,changePercent:0};return{price:null,changePercent:null}}
function pct(n){const x=Number(n);if(!isFinite(x))return'<span class="sub flat">—</span>';const c=x>0?'up':x<0?'down':'flat';return `<span class="sub ${c}">${x>0?'▲ ':''}${x<0?'▼ ':''}${fmt(Math.abs(x),2)}%</span>`}
function updateClock(){const n=new Date();$("twTime").textContent=n.toLocaleTimeString("zh-TW",{timeZone:"Asia/Taipei",hour12:false,hour:"2-digit",minute:"2-digit"});$("nyTime").textContent=n.toLocaleTimeString("zh-TW",{timeZone:"America/New_York",hour12:false,hour:"2-digit",minute:"2-digit"})}
function moodText(s){if(s>=80)return["😍 在旁邊看戲不要摻夥","貴死了，菜販都笑了。小心追高被套。",["👀 看戲","❌ 不追高"]];if(s>=60)return["😊 遇到颱風菜漲價","過陣子再買也不遲，先分批別梭哈。",["✅ 定期定額","🚶 慢慢買"]];if(s>=40)return["😐 靜觀其變","買錯也是平常價，先看看再說。",["👀 先看戲","✅ 小買可"]];if(s>=20)return["😨 過年大家吃團圓飯","可以買，開始有便宜貨。",["🛒 可以買","💰 分批撿"]];return["🥬 好菜頭大發財","好菜一堆沒人搶，不買等著當頭豬。",["🔥 撿便宜","🛒 分批買"]]}
function row(n,s,o){return `<div class="row"><div class="name">${n}<small>${s}</small></div><div class="price">${fmt(o.price,o.price>10000?0:2)}${pct(o.changePercent)}</div></div>`}
function pcts(){let a=[];["taiwan","us","crypto","fx"].forEach(g=>Object.values(DATA[g]||{}).forEach(v=>{if(v&&typeof v==="object"&&isFinite(v.changePercent))a.push(+v.changePercent)}));if(DATA.gold&&isFinite(DATA.gold.changePercent))a.push(+DATA.gold.changePercent);return a}
function score(){const a=pcts();const avg=a.length?a.reduce((x,y)=>x+y,0)/a.length:0;return Math.max(0,Math.min(100,Math.round(50+avg*10)))}
function renderMood(){const s=score(),m=moodText(s);$("score").textContent=s;$("mood").textContent=m[0];$("moodDesc").textContent=m[1];$("tags").innerHTML=m[2].map(x=>`<span class="tag">${x}</span>`).join("");$("gauge").style.setProperty("--rot",`${-70+s*1.4}deg`)}
function heatVal(base,p){return Math.min(100,Math.max(20,Math.round(base+Math.max(0,p||0)*6)))}
function renderHeat(){const vals=[["🔥 AI / 半導體",heatVal(80,item("us","NVDA").changePercent)],["🟡 台股電子股",heatVal(72,item("taiwan","2330").changePercent)],["🥇 黃金避險",heatVal(60,DATA.gold?.changePercent)],["₿ 比特幣 / 加密",heatVal(62,item("crypto","BTC").changePercent)],["💵 美元匯率",heatVal(55,item("fx","USDTWD").changePercent)]];$("heat").innerHTML=vals.map(v=>`<div class="barRow"><div class="barTop"><span>${v[0]}</span><span>${v[1]}%</span></div><div class="barBg"><div class="barFill" style="width:${v[1]}%"></div></div></div>`).join("")}
function renderRec(){const s=score();let line=s>=70?"今天菜有點貴，別一口氣梭哈。":s<=35?"菜變便宜，可以分批撿。":"市場平常價，分批就好。";$("todayLine").textContent=line;$("rec").innerHTML=`<div class="mini"><b>🥇 🇺🇸 美股 QQQ</b><div class="big">${fmt(item("us","QQQ").price)}</div><div class="note">建議 50,000 內分批｜回檔 3~5%｜出場 +10~15%</div></div><br><div class="mini"><b>🥈 🇹🇼 台股 0050</b><div class="big">${fmt(item("taiwan","0050").price)}</div><div class="note">建議 30,000 內分批｜靠近月線｜長期配置</div></div><br><div class="mini"><b>🥉 🥇 黃金</b><div class="big">${fmt(DATA.gold?.tael,0)} / 兩</div><div class="note">建議 20,000 內分批｜避險配置｜不要追高</div></div>`}
function sig(keys){const a=keys.map(x=>item(x[0],x[1]).changePercent).filter(isFinite);const avg=a.length?a.reduce((m,n)=>m+n,0)/a.length:0;if(avg>0.3)return"買菜中";if(avg<-0.3)return"等打折";return"逛市場"}
function renderOverview(){const it=[["台股",sig([["taiwan","0050"],["taiwan","2330"]])],["美股",sig([["us","SPY"],["us","QQQ"]])],["黃金",DATA.gold?.changePercent>0.3?"避險熱":"觀察"],["BTC",sig([["crypto","BTC"]])],["美元",DATA.fx?.USDTWD?.price?fmt(DATA.fx.USDTWD.price,3):"看匯率"],["ETF",sig([["taiwan","0050"],["us","VOO"]])]];$("overview").innerHTML=it.map(x=>`<div class="mini"><b>🟡 ${x[0]}</b><div class="big">${x[1]}</div></div>`).join("")}
function renderLists(){$("tw").innerHTML=row("0050 元大台灣50","0050",item("taiwan","0050"))+row("0056 元大高股息","0056",item("taiwan","0056"))+row("00878 國泰永續高股息","00878",item("taiwan","00878"))+row("00919 群益台灣精選高息","00919",item("taiwan","00919"))+row("2330 台積電","2330",item("taiwan","2330"))+row("2454 聯發科","2454",item("taiwan","2454"))+row("2317 鴻海","2317",item("taiwan","2317"));$("us").innerHTML=row("SPY 標普500","SPY",item("us","SPY"))+row("QQQ 那斯達克","QQQ",item("us","QQQ"))+row("VOO 標普500","VOO",item("us","VOO"))+row("SCHD 高股息","SCHD",item("us","SCHD"))+row("NVDA 輝達","NVDA",item("us","NVDA"))+row("TSLA 特斯拉","TSLA",item("us","TSLA"));$("watch").innerHTML=row("0050 元大台灣50","0050",item("taiwan","0050"))+row("台積電","2330",item("taiwan","2330"))+row("QQQ 那斯達克","QQQ",item("us","QQQ"))+row("黃金","USD/oz",{price:DATA.gold?.usd,changePercent:DATA.gold?.changePercent})+row("比特幣","BTC",item("crypto","BTC"))}
function renderGold(){$("goldCrypto").innerHTML=`<div class="calc"><span>黃金 USD/oz</span><b>${fmt(DATA.gold?.usd,2)} ${pct(DATA.gold?.changePercent)}</b></div><div class="calc"><span>黃金台幣/克</span><b>${fmt(DATA.gold?.twd,0)}</b></div><div class="calc"><span>黃金每兩</span><b>${fmt(DATA.gold?.tael,0)}</b></div><div class="calc"><span>美元/TWD</span><b>${fmt(item("fx","USDTWD").price,3)} ${pct(item("fx","USDTWD").changePercent)}</b></div><div class="calc"><span>BTC</span><b>${fmt(item("crypto","BTC").price,0)} ${pct(item("crypto","BTC").changePercent)}</b></div><div class="calc"><span>ETH</span><b>${fmt(item("crypto","ETH").price,0)} ${pct(item("crypto","ETH").changePercent)}</b></div>`}
function renderOther(){$("fx").innerHTML=row("美元 / 台幣","USDTWD",item("fx","USDTWD"))+row("日圓 / 台幣","JPYTWD",item("fx","JPYTWD"))+row("歐元 / 台幣","EURTWD",item("fx","EURTWD"));$("saving").innerHTML='<div class="calc"><span>LINE Bank</span><b>約 1.50%</b></div><div class="calc"><span>將來銀行</span><b>約 1.50%</b></div><div class="calc"><span>Richart</span><b>約 1.30%</b></div><div class="note">活動利率會變動，實際依官方公告。</div>';$("dividend").innerHTML='<div class="calc"><span>0056</span><b>季配觀察</b></div><div class="calc"><span>00878</span><b>季配觀察</b></div><div class="calc"><span>00919</span><b>季配觀察</b></div><div class="calc"><span>00929</span><b>月配觀察</b></div>';$("funds").innerHTML='<div class="calc"><span>安聯收益成長</span><b>收益型</b></div><div class="calc"><span>聯博全球高收益債</span><b>債券型</b></div><div class="calc"><span>貝萊德世界科技</span><b>科技型</b></div><div class="note">基金淨值更新來源較分散，這區先做觀察清單。</div>';$("news").innerHTML=(DATA.news&&DATA.news.length?DATA.news.map(n=>`<a href="${n.link}" target="_blank">📰 ${n.title}</a>`).join(""):'<div class="note">新聞更新中，先看行情。</div>')}
async function loadAll(){updateClock();try{DATA=await fetch("market-data.json?ts="+Date.now()).then(r=>r.json())}catch(e){DATA={taiwan:{},us:{},gold:{},crypto:{},fx:{}}}$("lastUpdate").textContent=DATA.updated_tw||DATA.updated||"AUTO";renderMood();renderRec();renderHeat();renderOverview();renderLists();renderGold();renderOther()}
function openChatGPT(){location.href="https://chat.openai.com/?q="+encodeURIComponent("請用菜市場白話分析今天財經儀表板，並給我台股、美股、ETF、黃金、BTC 建議。")}
loadAll();setInterval(updateClock,1000);
</script>
</body></html>
